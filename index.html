<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Stock Signals</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --positive: #3fb950;
            --negative: #f85149;
            --accent: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .updated-at {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }
        h2 {
            font-size: 1.2rem;
            margin: 2rem 0 0.8rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid var(--border);
        }
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
        .card-value {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .card-value.positive { color: var(--positive); }
        .card-value.negative { color: var(--negative); }
        .card-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }
        .chart-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 2rem;
            height: 280px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 1rem;
        }
        th, td {
            padding: 0.6rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        th {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        tr:hover { background: rgba(255,255,255,0.02); }
        .positive { color: var(--positive); font-weight: 600; }
        .negative { color: var(--negative); font-weight: 600; }
        .badge {
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-tp { background: rgba(63,185,80,0.2); color: var(--positive); }
        .badge-sl { background: rgba(248,81,73,0.2); color: var(--negative); }
        .badge-hold { background: rgba(88,166,255,0.2); color: var(--accent); }
        .badge-time { background: rgba(139,148,158,0.2); color: var(--text-muted); }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
        }
        .pagination button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .pagination button:hover { border-color: var(--accent); }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination .page-info {
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .footer {
            margin-top: 2rem;
            padding-top: 0.8rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .no-data {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
        }
        @media (max-width: 768px) {
            body { padding: 1rem; }
            th, td { padding: 0.4rem; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="updated-at">更新: 2026-07-22 07:36 JST</p>

        <h2>推奨銘柄 (2026-07-22)</h2>
        
        <table>
            <thead>
                <tr>
                    <th>銘柄</th>
                    <th>スコア</th>
                    <th>参考価格</th>
                    <th>利確目標</th>
                    <th>損切ライン</th>
                    <th>保有期間</th>
                    <th>数量</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>8725.T</td>
                    <td>0.702</td>
                    <td>¥4,740</td>
                    <td>¥5,119 (+8%)</td>
                    <td>¥4,503 (-5%)</td>
                    <td>5日</td>
                    <td>100株</td>
                </tr>
                <tr>
                    <td>8630.T</td>
                    <td>0.692</td>
                    <td>¥6,946</td>
                    <td>¥7,502 (+8%)</td>
                    <td>¥6,599 (-5%)</td>
                    <td>5日</td>
                    <td>100株</td>
                </tr>
                <tr>
                    <td>4568.T</td>
                    <td>0.691</td>
                    <td>¥2,815</td>
                    <td>¥3,040 (+8%)</td>
                    <td>¥2,674 (-5%)</td>
                    <td>5日</td>
                    <td>100株</td>
                </tr></tbody>
        </table>

        <h2>累計損益</h2>
        <div class="chart-container">
            <canvas id="equityChart"></canvas>
            <p class="no-data" id="noChartData" style="display:none; padding-top: 100px;">決済済みデータなし</p>
        </div>

        <h2>過去リターン</h2>
        
        <p class='no-data'>データなし</p>

        <div class="footer">
            <p>&#9888; 機械学習モデルの出力です。投資助言ではありません。</p>
        </div>
    </div>

    <script>
    // ページネーション
    (function() {
        const table = document.getElementById('returnsTable');
        if (!table) return;
        const rows = Array.from(table.querySelectorAll('tbody tr'));
        const perPage = 15;
        let currentPage = 0;
        const totalPages = Math.ceil(rows.length / perPage);

        function render() {
            rows.forEach((r, i) => {
                r.style.display = (i >= currentPage * perPage && i < (currentPage + 1) * perPage) ? '' : 'none';
            });
            document.getElementById('pageInfo').textContent = `${currentPage + 1} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
        }

        window.changePage = function(delta) {
            currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + delta));
            render();
        };

        render();
    })();

    // エクイティカーブ
    (function() {
        const data = [];
        if (!data || data.length === 0) {
            document.getElementById('equityChart').style.display = 'none';
            document.getElementById('noChartData').style.display = 'block';
            return;
        }

        const ctx = document.getElementById('equityChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(d => d.date),
                datasets: [{
                    data: data.map(d => d.cumulative_pnl),
                    borderColor: '#58a6ff',
                    backgroundColor: 'rgba(88, 166, 255, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 3,
                    pointBackgroundColor: data.map(d => d.cumulative_pnl >= 0 ? '#3fb950' : '#f85149'),
                    borderWidth: 2,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return '¥' + context.parsed.y.toLocaleString();
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: { color: '#8b949e', font: { size: 11 } },
                        grid: { color: 'rgba(48,54,61,0.5)' }
                    },
                    y: {
                        ticks: {
                            color: '#8b949e',
                            font: { size: 11 },
                            callback: function(value) {
                                return '¥' + value.toLocaleString();
                            }
                        },
                        grid: { color: 'rgba(48,54,61,0.5)' }
                    }
                }
            }
        });
    })();
    </script>
</body>
</html>
